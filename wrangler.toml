name = "soarcast"
main = "./worker.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./build/client"
binding = "ASSETS"

[vars]
BETTER_AUTH_URL = "https://soarcast.mckinleyaviation.com"

[[routes]]
pattern = "soarcast.mckinleyaviation.com"
custom_domain = true
